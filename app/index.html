<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Job Agent</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f7f9;
        color: #172033;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        border: 1px solid #d9dee7;
        border-radius: 16px;
        padding: 32px;
        background: #ffffff;
        box-shadow: 0 16px 48px rgb(23 32 51 / 8%);
      }

      h1 {
        margin: 0 0 12px;
      }

      p {
        line-height: 1.6;
      }

      code {
        border-radius: 6px;
        padding: 2px 6px;
        background: #eef1f6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Job Agent</h1>
      <p>
        Milestone 1 placeholder app. JD input, resume input, analysis results,
        follow-up Q&amp;A, file uploads, and job-source collection are intentionally
        out of scope for this milestone.
      </p>
      <p>Start the API placeholder separately with <code>npm run start:server</code>.</p>
    </main>
  </body>
</html>
